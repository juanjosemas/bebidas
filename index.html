<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Bebidas</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700&displayfamily=Amatic+SC:wght@700&family=Caveat:wght@700&family=Dancing+Script:wght@700&family=Lobster&family=Metal+Mania&family=Yellowtail& family=Permanent+Marker&family=Piedra&family=Sriracha&display=swap" rel="stylesheet">
</head>
<body>

<h1><u><q>Lista de Bebidas</q></u></h1>


<ul id="bebidas-lista">
    <!-- Aquí se agregan dinámicamente las bebidas -->
</ul>

<div class="footer">
    <button id="resetear-btn" class="btn-lg">Reset</button>
    <input type="text" id="bebida-input" placeholder="Ingresar bebida">
    <button id="confirmar-btn"><i>Confirmar</i></button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <input type="text" id="bebida-input" placeholder="Ingresa el tipo de bebida">
        <button id="confirmar-btn">Confirmar</button>
    </div>
</div>



<script src="script.js"></script>
</body>
</html>
